<meta name="theme-color" content="#050807">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
  rel="stylesheet"
>

<style>
  :root {
    color-scheme: dark;
    --ops-bg: #050807;
    --ops-bg-soft: #0a0f0d;
    --ops-panel: rgba(7, 13, 10, 0.9);
    --ops-panel-strong: rgba(4, 9, 7, 0.96);
    --ops-border: rgba(78, 255, 145, 0.18);
    --ops-border-strong: rgba(78, 255, 145, 0.34);
    --ops-text: #d7ffe6;
    --ops-muted: #8aad97;
    --ops-green: #4eff91;
    --ops-green-dim: #27c96c;
    --ops-green-soft: rgba(78, 255, 145, 0.1);
    --ops-shadow: 0 0 0 1px rgba(78, 255, 145, 0.06), 0 0 22px rgba(78, 255, 145, 0.08);
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    position: relative;
    isolation: isolate;
    background:
      radial-gradient(circle at top, rgba(78, 255, 145, 0.08), transparent 34%),
      linear-gradient(180deg, #040605 0%, #060a08 48%, #030504 100%);
    color: var(--ops-text);
    font-family: 'JetBrains Mono', monospace;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.02) 0,
        rgba(255, 255, 255, 0.02) 1px,
        transparent 1px,
        transparent 3px
      );
    opacity: 0.08;
    z-index: -1;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(circle at center, transparent 52%, rgba(0, 0, 0, 0.38) 100%);
    z-index: -1;
  }

  [data-mode='dark'],
  :root:not([data-mode='light']) {
    --main-bg: var(--ops-bg);
    --mask-bg: var(--ops-bg-soft);
    --main-border-color: var(--ops-border);
    --text-color: var(--ops-text);
    --text-muted-color: var(--ops-muted);
    --text-muted-highlight-color: #c6ffda;
    --heading-color: #effff5;
    --label-color: #bff6cf;
    --blockquote-border-color: var(--ops-border-strong);
    --blockquote-text-color: #b5e7c3;
    --link-color: var(--ops-green);
    --link-underline-color: rgba(78, 255, 145, 0.28);
    --button-bg: rgba(7, 13, 10, 0.9);
    --btn-border-color: var(--ops-border);
    --btn-backtotop-color: var(--ops-green);
    --btn-backtotop-border-color: var(--ops-border-strong);
    --card-header-bg: rgba(6, 12, 9, 0.94);
    --checkbox-color: var(--ops-green-dim);
    --checkbox-checked-color: var(--ops-green);
    --img-bg: radial-gradient(circle, rgba(8, 16, 12, 0.92) 0%, rgba(3, 5, 4, 1) 100%);
    --shimmer-bg: linear-gradient(90deg, transparent 0%, rgba(78, 255, 145, 0.18) 50%, transparent 100%);
    --site-title-color: #f2fff7;
    --site-subtitle-color: #93b29f;
    --sidebar-bg: rgba(4, 8, 6, 0.96);
    --sidebar-border-color: var(--ops-border);
    --sidebar-muted-color: #87a391;
    --sidebar-active-color: #f4fff7;
    --sidebar-hover-bg: rgba(78, 255, 145, 0.08);
    --sidebar-btn-bg: rgba(8, 14, 11, 0.92);
    --sidebar-btn-color: var(--ops-green);
    --avatar-border-color: rgba(78, 255, 145, 0.42);
    --topbar-bg: rgba(4, 8, 6, 0.82);
    --topbar-text-color: #c8efd6;
    --search-border-color: var(--ops-border);
    --search-icon-color: #79d39b;
    --input-focus-border-color: rgba(78, 255, 145, 0.4);
    --post-list-text-color: #bad8c4;
    --btn-patinator-text-color: #d8ffe6;
    --btn-paginator-hover-color: rgba(78, 255, 145, 0.08);
    --toc-highlight: var(--ops-green);
    --toc-popup-border-color: var(--ops-border);
    --tag-hover: rgba(78, 255, 145, 0.1);
    --tb-odd-bg: rgba(7, 13, 10, 0.94);
    --tb-even-bg: rgba(4, 8, 6, 0.98);
    --tb-border-color: rgba(78, 255, 145, 0.1);
    --footnote-target-bg: rgba(78, 255, 145, 0.2);
    --btn-share-color: #a9d9ba;
    --btn-share-hover-color: #ffffff;
    --card-bg: rgba(6, 12, 9, 0.9);
    --card-hover-bg: rgba(8, 16, 12, 0.96);
    --card-shadow: var(--ops-shadow);
    --kbd-wrap-color: rgba(78, 255, 145, 0.2);
    --kbd-text-color: #ddffe8;
    --kbd-bg-color: rgba(6, 12, 9, 0.96);
    --prompt-text-color: #d7ffe6;
    --prompt-tip-bg: rgba(78, 255, 145, 0.12);
    --prompt-tip-icon-color: var(--ops-green);
    --prompt-info-bg: rgba(78, 255, 145, 0.1);
    --prompt-info-icon-color: var(--ops-green);
    --prompt-warning-bg: rgba(255, 195, 73, 0.12);
    --prompt-warning-icon-color: #ffc349;
    --prompt-danger-bg: rgba(255, 92, 92, 0.12);
    --prompt-danger-icon-color: #ff7b7b;
    --tag-border: rgba(78, 255, 145, 0.18);
    --tag-shadow: rgba(0, 0, 0, 0.35);
    --dash-color: rgba(78, 255, 145, 0.24);
    --search-tag-bg: rgba(6, 12, 9, 0.95);
    --categories-border: rgba(78, 255, 145, 0.12);
    --categories-hover-bg: rgba(78, 255, 145, 0.08);
    --categories-icon-hover-color: var(--ops-green);
    --timeline-node-bg: var(--ops-green);
    --timeline-color: rgba(78, 255, 145, 0.18);
    --timeline-year-dot-color: var(--ops-green);
    --language-border-color: rgba(78, 255, 145, 0.12);
    --highlight-bg-color: rgba(2, 5, 4, 0.98);
    --highlighter-rouge-color: #dcffe8;
    --highlight-lineno-color: #628171;
    --inline-code-bg: rgba(78, 255, 145, 0.06);
    --code-color: #dcffe8;
    --code-header-text-color: #9fdfb5;
    --code-header-muted-color: rgba(78, 255, 145, 0.08);
    --code-header-icon-color: #87bf9a;
    --clipboard-checked-color: var(--ops-green);
    --filepath-text-color: #eefff4;
  }

  .site-title,
  h1,
  h2,
  h3,
  h4,
  #topbar-title,
  .post-title,
  .card-title,
  .navbar,
  .sidebar {
    font-family: 'Space Grotesk', 'JetBrains Mono', sans-serif;
    letter-spacing: 0.03em;
  }

  code,
  pre,
  .highlight,
  .post-meta,
  #sidebar .nav-link span,
  #sidebar .sidebar-bottom,
  #search-results a,
  .breadcrumb {
    font-family: 'JetBrains Mono', monospace;
  }

  a {
    transition: color 140ms ease, border-color 140ms ease, background-color 140ms ease, box-shadow 140ms ease;
  }

  a:hover {
    color: #ffffff;
    text-shadow: 0 0 10px rgba(78, 255, 145, 0.15);
  }

  #sidebar {
    backdrop-filter: blur(10px);
    border-right: 1px solid var(--ops-border);
    box-shadow: 10px 0 32px rgba(0, 0, 0, 0.28);
  }

  #sidebar .site-title {
    color: #f4fff7 !important;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  #sidebar .site-subtitle {
    color: #91b29e !important;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 0.68rem;
  }

  #sidebar .nav-link,
  #sidebar .sidebar-bottom a,
  #sidebar #mode-toggle {
    border: 1px solid transparent;
    border-radius: 10px;
  }

  #sidebar .nav-link:hover,
  #sidebar .nav-item.active .nav-link,
  #sidebar .sidebar-bottom a:hover,
  #sidebar #mode-toggle:hover {
    background: rgba(78, 255, 145, 0.08);
    border-color: rgba(78, 255, 145, 0.16);
    box-shadow: 0 0 14px rgba(78, 255, 145, 0.06);
  }

  #mode-toggle {
    display: none !important;
  }

  #avatar {
    box-shadow: 0 0 0 2px rgba(78, 255, 145, 0.18), 0 0 18px rgba(78, 255, 145, 0.08);
  }

  #topbar-wrapper,
  #topbar {
    backdrop-filter: blur(12px);
  }

  #topbar,
  #search-input,
  #search-result-wrapper,
  .card,
  .categories,
  .list-group-item,
  .post-navigation .btn,
  #toc-wrapper,
  .pagination .page-link,
  .btn,
  .form-control,
  .highlight,
  .post-preview {
    border-color: var(--ops-border) !important;
    box-shadow: var(--ops-shadow);
  }

  .card,
  .post-preview,
  .pagination .page-link,
  .btn,
  .form-control,
  .categories,
  .list-group-item,
  #toc-wrapper,
  #search-result-wrapper,
  #topbar {
    background: rgba(6, 12, 9, 0.84) !important;
  }

  .card,
  .post-preview,
  .highlight,
  #toc-wrapper,
  #search-result-wrapper,
  .form-control {
    backdrop-filter: blur(8px);
  }

  .post-preview,
  .card {
    border-left: 2px solid rgba(78, 255, 145, 0.18);
  }

  .post-preview:hover,
  .card:hover,
  .pagination .page-link:hover,
  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 0 1px rgba(78, 255, 145, 0.12), 0 0 18px rgba(78, 255, 145, 0.08);
  }

  #post-list .card-title,
  .post-content h2,
  .post-content h3,
  .post-content h4 {
    color: #f4fff7;
  }

  .post-tag,
  .post-meta .categories,
  .categories .list-group-item,
  .tag,
  .btn.btn-outline-primary {
    border-radius: 999px;
    letter-spacing: 0.03em;
  }

  .post-tag,
  .tag,
  .btn.btn-outline-primary {
    background: rgba(78, 255, 145, 0.05) !important;
    border: 1px solid rgba(78, 255, 145, 0.18) !important;
    color: #d9ffe7 !important;
  }

  .btn-primary,
  .btn-primary:focus,
  .pagination .page-link.active,
  .pagination .active > .page-link {
    background: linear-gradient(180deg, rgba(78, 255, 145, 0.18), rgba(39, 201, 108, 0.2)) !important;
    border-color: rgba(78, 255, 145, 0.34) !important;
    color: #ffffff !important;
  }

  blockquote {
    background: linear-gradient(90deg, rgba(78, 255, 145, 0.08), transparent 70%);
    border-radius: 0 10px 10px 0;
    padding: 0.8rem 1rem;
  }

  hr {
    border-color: rgba(78, 255, 145, 0.12);
  }

  kbd {
    border-radius: 8px;
    border-color: rgba(78, 255, 145, 0.18);
    box-shadow: inset 0 -1px 0 rgba(78, 255, 145, 0.12);
  }

  .highlight,
  div.highlight,
  figure.highlight {
    background: rgba(3, 6, 5, 0.98) !important;
  }

  .highlighter-rouge,
  code {
    text-shadow: 0 0 8px rgba(78, 255, 145, 0.08);
  }

  ::selection {
    background: rgba(78, 255, 145, 0.28);
    color: #ffffff;
  }

  ::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }

  ::-webkit-scrollbar-track {
    background: rgba(4, 9, 7, 0.98);
  }

  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(78, 255, 145, 0.5), rgba(39, 201, 108, 0.5));
    border-radius: 999px;
    border: 2px solid rgba(4, 9, 7, 0.98);
  }

  @media (max-width: 991px) {
    body::before {
      opacity: 0.06;
    }

    #topbar,
    .card,
    .post-preview,
    #search-result-wrapper {
      backdrop-filter: blur(6px);
    }
  }
</style>

<script>
  document.documentElement.setAttribute('data-mode', 'dark');
</script>
