<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link

<style>
  :root {
    color-scheme: dark;
    --ops-bg: #06080c;
    --ops-bg-soft: #0a0f14;
    --ops-panel: rgba(8, 12, 18, 0.9);
    --ops-panel-strong: rgba(6, 9, 14, 0.96);
    --ops-border: rgba(88, 144, 168, 0.2);
    --ops-border-strong: rgba(88, 144, 168, 0.36);

    --ops-muted: #90a7b8;
    --ops-green: #5890a8;
    --ops-green-dim: #487080;
    --ops-green-soft: rgba(88, 144, 168, 0.12);
    --ops-shadow: 0 0 0 1px rgba(88, 144, 168, 0.08), 0 0 22px rgba(88, 144, 168, 0.1);
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    position: relative;
    isolation: isolate;
    background:
      radial-gradient(circle at top, rgba(88, 144, 168, 0.1), transparent 34%),
      linear-gradient(180deg, #04070a 0%, #081018 48%, #04060a 100%);
    color: var(--ops-text);
    font-family: 'JetBrains Mono', monospace;
  }

  #main-wrapper,
  .post-content,
  .post-content p,
  .post-content li,
  .post-content blockquote,
  .content p,
  .content li,
  .post-preview .card-text,
  article {
    font-family: 'Source Serif 4', Georgia, serif;
  }

  .post-content,
  .post-content p,
  .post-content li,
  .content p,
  .content li,
  .post-preview .card-text {
    font-size: 1.06rem;
    line-height: 1.92;
    letter-spacing: 0.01em;
  }

  .post-content strong,
  .content strong {
    color: #f2f8ff;
    font-weight: 600;
  }

  .post-content code,
  .post-content pre,
  .post-content .highlight,
  .post-content kbd,
  .post-meta,
  .post-tail-wrapper,
  .post-tail-wrapper * {
    font-family: 'JetBrains Mono', monospace;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.02) 0,
        rgba(255, 255, 255, 0.02) 1px,
        transparent 1px,
        transparent 3px
      );
    opacity: 0.08;
    z-index: -1;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(circle at center, transparent 52%, rgba(0, 0, 0, 0.38) 100%);
    z-index: -1;
  }

  [data-mode='dark'],
  :root:not([data-mode='light']) {
    --main-bg: var(--ops-bg);
    --mask-bg: var(--ops-bg-soft);
    --main-border-color: var(--ops-border);
    --text-color: var(--ops-text);
    --text-muted-color: var(--ops-muted);
    --text-muted-highlight-color: #d1e7f6;
    --heading-color: #eff8ff;
    --label-color: #c8e3f4;
    --blockquote-border-color: var(--ops-border-strong);
    --blockquote-text-color: #b8d7e8;
    --link-color: var(--ops-green);
    --link-underline-color: rgba(88, 144, 168, 0.28);
    --button-bg: rgba(8, 12, 18, 0.9);
    --btn-border-color: var(--ops-border);
    --btn-backtotop-color: var(--ops-green);
    --btn-backtotop-border-color: var(--ops-border-strong);
    --card-header-bg: rgba(8, 12, 18, 0.94);
    --checkbox-color: var(--ops-green-dim);
    --checkbox-checked-color: var(--ops-green);
    --img-bg: radial-gradient(circle, rgba(10, 16, 24, 0.92) 0%, rgba(4, 6, 10, 1) 100%);
    --shimmer-bg: linear-gradient(90deg, transparent 0%, rgba(88, 144, 168, 0.2) 50%, transparent 100%);
    --site-title-color: #f1f8ff;
    --site-subtitle-color: #8ea8b9;
    --sidebar-bg: rgba(6, 10, 15, 0.96);
    --sidebar-border-color: var(--ops-border);
    --sidebar-muted-color: #879cad;
    --sidebar-active-color: #f3f8ff;
    --sidebar-hover-bg: rgba(88, 144, 168, 0.1);
    --sidebar-btn-bg: rgba(10, 15, 22, 0.92);
    --sidebar-btn-color: var(--ops-green);
    --avatar-border-color: rgba(88, 144, 168, 0.42);
    --topbar-bg: rgba(6, 10, 15, 0.82);
    --topbar-text-color: #cfe5f5;
    --search-border-color: var(--ops-border);
    --search-icon-color: #7aa4bc;
    --input-focus-border-color: rgba(88, 144, 168, 0.44);
    --post-list-text-color: #bdd3e2;
    --btn-patinator-text-color: #dcefff;
    --btn-paginator-hover-color: rgba(88, 144, 168, 0.1);
    --toc-highlight: var(--ops-green);
    --toc-popup-border-color: var(--ops-border);
    --tag-hover: rgba(88, 144, 168, 0.1);
    --tb-odd-bg: rgba(8, 12, 18, 0.94);
    --tb-even-bg: rgba(6, 9, 14, 0.98);
    --tb-border-color: rgba(88, 144, 168, 0.12);
    --footnote-target-bg: rgba(88, 144, 168, 0.22);
    --btn-share-color: #a9c7da;
    --btn-share-hover-color: #ffffff;
    --card-bg: rgba(8, 12, 18, 0.9);
    --card-hover-bg: rgba(10, 16, 24, 0.96);
    --card-shadow: var(--ops-shadow);
    --kbd-wrap-color: rgba(88, 144, 168, 0.22);
    --kbd-text-color: #deeffb;
    --kbd-bg-color: rgba(8, 12, 18, 0.96);
    --prompt-text-color: #dcefff;
    --prompt-tip-bg: rgba(88, 144, 168, 0.12);
    --prompt-tip-icon-color: var(--ops-green);
    --prompt-info-bg: rgba(88, 144, 168, 0.1);
    --prompt-info-icon-color: var(--ops-green);
    --prompt-warning-bg: rgba(255, 195, 73, 0.12);
    --prompt-warning-icon-color: #ffc349;
    --prompt-danger-bg: rgba(255, 92, 92, 0.12);
    --prompt-danger-icon-color: #ff7b7b;
    --tag-border: rgba(88, 144, 168, 0.2);
    --tag-shadow: rgba(0, 0, 0, 0.35);
    --dash-color: rgba(88, 144, 168, 0.24);
    --search-tag-bg: rgba(8, 12, 18, 0.95);
    --categories-border: rgba(88, 144, 168, 0.12);
    --categories-hover-bg: rgba(88, 144, 168, 0.08);
    --categories-icon-hover-color: var(--ops-green);
    --timeline-node-bg: var(--ops-green);
    --timeline-color: rgba(88, 144, 168, 0.2);
    --timeline-year-dot-color: var(--ops-green);
    --language-border-color: rgba(88, 144, 168, 0.12);
    --highlight-bg-color: rgba(3, 5, 9, 0.98);
    --highlighter-rouge-color: #deeffb;
    --highlight-lineno-color: #6f8696;
    --inline-code-bg: rgba(88, 144, 168, 0.08);
    --code-color: #deeffb;
    --code-header-text-color: #a8c8db;
    --code-header-muted-color: rgba(88, 144, 168, 0.08);
    --code-header-icon-color: #8faec1;
    --clipboard-checked-color: var(--ops-green);
    --filepath-text-color: #eef7ff;
  }

  .site-title,
  h1,
  h2,
  h3,
  h4,
  #topbar-title,
  .post-title,
  .card-title,
  .navbar,
  .sidebar {
    font-family: 'Space Grotesk', 'JetBrains Mono', sans-serif;
    letter-spacing: 0.03em;
  }

  code,
  pre,
  .highlight,
  .post-meta,
  #sidebar .nav-link span,
  #sidebar .sidebar-bottom,
  #search-results a,
  .breadcrumb {
    font-family: 'JetBrains Mono', monospace;
  }

  a {
    transition: color 140ms ease, border-color 140ms ease, background-color 140ms ease, box-shadow 140ms ease;
  }

  a:hover {
    color: #ffffff;
    text-shadow: 0 0 10px rgba(88, 144, 168, 0.18);
  }

  #sidebar {
    backdrop-filter: blur(10px);
    border-right: 1px solid var(--ops-border);
    box-shadow: 10px 0 32px rgba(0, 0, 0, 0.28);
  }

  #sidebar .site-title {
    color: #f2f8ff !important;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  #sidebar .site-subtitle {
    color: #8ea8b9 !important;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 0.68rem;
  }

  #sidebar .sidebar-signal {
    margin: 1.35rem 0 1.1rem;
    padding: 0.85rem 0.9rem 0.95rem;
    border: 1px solid rgba(88, 144, 168, 0.18);
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(88, 144, 168, 0.08), rgba(88, 144, 168, 0.04));
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.015);
  }

  #sidebar .sidebar-signal__label,
  #sidebar .sidebar-signal__refs {
    font-family: 'JetBrains Mono', monospace;
  }

  #sidebar .sidebar-signal__label {
    margin-bottom: 0.45rem;
    color: #d8ecfb;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  #sidebar .sidebar-signal__body {
    color: #bcd2e1;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 0.95rem;
    line-height: 1.65;
  }

  #sidebar .sidebar-signal__refs {
    margin-top: 0.7rem;
    color: #7f97a8;
    font-size: 0.67rem;
    line-height: 1.6;
  }

  #sidebar .nav-link,
  #sidebar .sidebar-bottom a,
  #sidebar #mode-toggle {
    border: 1px solid transparent;
    border-radius: 10px;
  }

  #sidebar .nav-link:hover,
  #sidebar .nav-item.active .nav-link,
  #sidebar .sidebar-bottom a:hover,
  #sidebar #mode-toggle:hover {
    background: rgba(88, 144, 168, 0.1);
    border-color: rgba(88, 144, 168, 0.18);
    box-shadow: 0 0 14px rgba(88, 144, 168, 0.08);
  }

  #mode-toggle {
    display: none !important;
  }

  #avatar {
    box-shadow: 0 0 0 2px rgba(88, 144, 168, 0.22), 0 0 18px rgba(88, 144, 168, 0.12);
  }

  #topbar-wrapper,
  #topbar {
    backdrop-filter: blur(12px);
  }

  #topbar,
  #search-input,
  #search-result-wrapper,
  .card,
  .categories,
  .list-group-item,
  .post-navigation .btn,
  #toc-wrapper,
  .pagination .page-link,
  .btn,
  .form-control,
  .highlight,
  .post-preview {
    border-color: var(--ops-border) !important;
    box-shadow: var(--ops-shadow);
  }

  .card,
  .post-preview,
  .pagination .page-link,
  .btn,
  .form-control,
  .categories,
  .list-group-item,
  #toc-wrapper,
  #search-result-wrapper,
  #topbar {
    background: rgba(8, 12, 18, 0.84) !important;
  }

  .card,
  .post-preview,
  .highlight,
  #toc-wrapper,
  #search-result-wrapper,
  .form-control {
    backdrop-filter: blur(8px);
  }

  .post-preview,
  .card {
    border-left: 2px solid rgba(88, 144, 168, 0.2);
  }

  .post-preview:hover,
  .card:hover,
  .pagination .page-link:hover,
  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 0 1px rgba(88, 144, 168, 0.14), 0 0 18px rgba(88, 144, 168, 0.1);
  }

  #post-list .card-title,
  .post-content h2,
  .post-content h3,
  .post-content h4 {
    color: #f2f8ff;
  }

  .post-tag,
  .post-meta .categories,
  .categories .list-group-item,
  .tag,
  .btn.btn-outline-primary {
    border-radius: 999px;
    letter-spacing: 0.03em;
  }

  .post-tag,
  .tag,
  .btn.btn-outline-primary {
    background: rgba(88, 144, 168, 0.08) !important;
    border: 1px solid rgba(88, 144, 168, 0.2) !important;
    color: #dcefff !important;
  }

  .btn-primary,
  .btn-primary:focus,
  .pagination .page-link.active,
  .pagination .active > .page-link {
    background: linear-gradient(180deg, rgba(88, 144, 168, 0.22), rgba(72, 112, 128, 0.24)) !important;
    border-color: rgba(88, 144, 168, 0.34) !important;
    color: #ffffff !important;
  }

  blockquote {
    background: linear-gradient(90deg, rgba(88, 144, 168, 0.1), transparent 70%);
    border-radius: 0 10px 10px 0;
    padding: 0.8rem 1rem;
  }

  hr {
    border-color: rgba(88, 144, 168, 0.12);
  }

  kbd {
    border-radius: 8px;
    border-color: rgba(88, 144, 168, 0.18);
    box-shadow: inset 0 -1px 0 rgba(88, 144, 168, 0.12);
  }

  .highlight,
  div.highlight,
  figure.highlight {
    background: rgba(4, 7, 11, 0.98) !important;
  }

  .highlighter-rouge,
  code {
    text-shadow: 0 0 8px rgba(88, 144, 168, 0.1);
  }

  @media (max-width: 768px) {
    .post-content,
    .post-content p,
    .post-content li,
    .content p,
    .content li,
    .post-preview .card-text {
      font-size: 1rem;
      line-height: 1.82;
    }
  }

  ::selection {
    background: rgba(88, 144, 168, 0.28);
    color: #ffffff;
  }

  ::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }

  ::-webkit-scrollbar-track {
    background: rgba(5, 8, 12, 0.98);
  }

  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(88, 144, 168, 0.55), rgba(72, 112, 128, 0.55));
    border-radius: 999px;
    border: 2px solid rgba(5, 8, 12, 0.98);
  }

  @media (max-width: 991px) {
    body::before {
      opacity: 0.06;
    }

    #topbar,
    .card,
    .post-preview,
    #search-result-wrapper {
      backdrop-filter: blur(6px);
    }
  }

  .ops-glitch {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    z-index: 6;
    mix-blend-mode: screen;
    transition: opacity 140ms ease;
  }

  .ops-glitch.is-active {
    opacity: 1;
  }

  .ops-glitch__scan,
  .ops-glitch__ghost,
  .ops-glitch__noise {
    position: absolute;
    inset: 0;
  }

  .ops-glitch__scan {
    background: linear-gradient(
      180deg,
      transparent 0%,
      transparent calc(var(--glitch-top, 18%) - 1%),
      rgba(88, 144, 168, 0.05) calc(var(--glitch-top, 18%) - 1%),
      rgba(88, 144, 168, 0.18) var(--glitch-top, 18%),
      rgba(88, 144, 168, 0.06) calc(var(--glitch-top, 18%) + var(--glitch-height, 12%)),
      transparent calc(var(--glitch-top, 18%) + var(--glitch-height, 12%) + 1%),
      transparent 100%
    );
  }

  .ops-glitch__ghost {
    background: linear-gradient(90deg, rgba(88, 144, 168, 0.12), transparent 38%, transparent 62%, rgba(88, 144, 168, 0.08));
    transform: translate3d(var(--glitch-shift, 8px), 0, 0);
    filter: blur(0.8px);
    opacity: 0.5;
  }

  .ops-glitch__noise {
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.06) 0,
        rgba(255, 255, 255, 0.06) 1px,
        transparent 1px,
        transparent 4px
      );
    opacity: 0.14;
  }

  .ops-glitch.is-active .ops-glitch__scan {
    animation: ops-glitch-scan 420ms steps(4, end) 1;
  }

  .ops-glitch.is-active .ops-glitch__ghost {
    animation: ops-glitch-ghost 420ms steps(3, end) 1;
  }

  .ops-glitch.is-active .ops-glitch__noise {
    animation: ops-glitch-noise 420ms steps(5, end) 1;
  }

  @keyframes ops-glitch-scan {
    0% { transform: translate3d(0, -2px, 0); opacity: 0; }
    15% { transform: translate3d(0, 2px, 0); opacity: 0.85; }
    45% { transform: translate3d(0, -1px, 0); opacity: 0.55; }
    75% { transform: translate3d(0, 1px, 0); opacity: 0.3; }
    100% { transform: translate3d(0, 0, 0); opacity: 0; }
  }

  @keyframes ops-glitch-ghost {
    0% { transform: translate3d(0, 0, 0); opacity: 0; }
    20% { transform: translate3d(var(--glitch-shift, 8px), 0, 0); opacity: 0.55; }
    60% { transform: translate3d(calc(var(--glitch-shift, 8px) * -0.4), 0, 0); opacity: 0.28; }
    100% { transform: translate3d(0, 0, 0); opacity: 0; }
  }

  @keyframes ops-glitch-noise {
    0% { opacity: 0; }
    30% { opacity: 0.18; }
    65% { opacity: 0.08; }
    100% { opacity: 0; }
  }
</style>

<script>
  document.documentElement.setAttribute('data-mode', 'dark');

  document.addEventListener('DOMContentLoaded', () => {
    const sidebar = document.getElementById('sidebar');
    const subtitle = sidebar && sidebar.querySelector('.site-subtitle');

    if (!sidebar || !subtitle || sidebar.querySelector('.sidebar-signal')) {
      return;
    }

    const panel = document.createElement('section');
    panel.className = 'sidebar-signal';
    panel.innerHTML = `
      <div class="sidebar-signal__label">ops.notes</div>
      <div class="sidebar-signal__body">AI orchestration, threat notes, infra discrete, opsec, et autopsies techniques publiees sans vernis corporate.</div>
      <div class="sidebar-signal__refs">2600 Hz · Phrack · RFC 1149 · phreaking · null route · zero-day folklore</div>
    `;

    subtitle.insertAdjacentElement('afterend', panel);

    const glitch = document.createElement('aside');
    glitch.className = 'ops-glitch';
    glitch.setAttribute('aria-hidden', 'true');
    glitch.innerHTML = `
      <div class="ops-glitch__scan"></div>
      <div class="ops-glitch__ghost"></div>
      <div class="ops-glitch__noise"></div>
    `;
    document.body.appendChild(glitch);

    const triggerGlitch = () => {
      const top = (12 + Math.random() * 58).toFixed(1) + '%';
      const height = (6 + Math.random() * 16).toFixed(1) + '%';
      const shift = (4 + Math.random() * 10).toFixed(0) + 'px';
      glitch.style.setProperty('--glitch-top', top);
      glitch.style.setProperty('--glitch-height', height);
      glitch.style.setProperty('--glitch-shift', shift);
      glitch.classList.remove('is-active');
      void glitch.offsetWidth;
      glitch.classList.add('is-active');
      window.setTimeout(() => glitch.classList.remove('is-active'), 520);
    };

    const scheduleGlitch = () => {
      const delay = 105000 + Math.floor(Math.random() * 30000);
      window.setTimeout(() => {
        if (!document.hidden) {
          triggerGlitch();
        }
        scheduleGlitch();
      }, delay);
    };

    scheduleGlitch();
  });
</script>
